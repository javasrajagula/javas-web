<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Javas - Premium Bio Page with Advanced Animations & Interactive Experience. フリーレン：旅の終わりの先へ">
  <meta name="keywords" content="Javas, Portfolio, Interactive, Bio, Premium Design">
  <meta name="author" content="Javas">
  <meta name="theme-color" content="#000000">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Javas">
  <meta property="og:description" content="Javas - フリーレン：旅の終わりの先へ">
  <meta property="og:image" content="https://i.imgur.com/Ho4R7Ph.jpeg">
  
  <link rel="icon" href="https://i.imgur.com/Ho4R7Ph.jpeg">
  <title>Javas</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6c5ce7;
      --secondary: #a29bfe;
      --accent: #ff7675;
      --text: #080808;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://i.imgur.com/y42rCO1.jpeg') no-repeat center/cover;
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      cursor: none;
      position: relative;
    }

    /* ===== GLASSMORPHISM OVERLAY ===== */
    .glass-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(30px);
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
      pointer-events: none;
    }

    /* ===== LOADER ===== */
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeOutLoader 0.8s ease 2.2s forwards;
    }

    .loader-spinner {
      width: 80px;
      height: 80px;
      position: relative;
      margin-bottom: 30px;
    }

    .loader-spinner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }

    .loader-spinner::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border: 4px solid transparent;
      border-bottom: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite reverse;
    }

    .loader-text {
      color: rgb(19, 18, 18);
      font-size: 1.2rem;
      letter-spacing: 3px;
      font-weight: 600;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes fadeOutLoader {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    /* ===== CUSTOM CURSOR ===== */
    .cursor {
      width: 30px;
      height: 30px;
      border: 2px solid var(--primary);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: all 0.1s ease;
    }

    .cursor::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .cursor.active {
      width: 50px;
      height: 50px;
      border-color: var(--accent);
      background: rgba(255, 118, 117, 0.1);
    }

    /* ===== CURSOR TRAIL ===== */
    .cursor-trail {
      position: fixed;
      pointer-events: none;
      border: 2px solid var(--primary);
      border-radius: 50%;
      z-index: 997;
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 998;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(10px);
      color: white;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .theme-toggle:hover {
      transform: scale(1.15) rotate(20deg);
      background: rgba(108, 92, 231, 0.2);
      border-color: var(--primary);
    }

    /* ===== MAIN CONTENT ===== */
    .wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
      animation: slideInDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== PROFILE SECTION ===== */
    .profile {
      margin-bottom: 40px;
      position: relative;
    }

    .profile-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
    }

    .profile-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      opacity: 0;
      animation: glowPulse 3s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes glowPulse {
      0%, 100% { 
        opacity: 0;
        transform: scale(0.9);
      }
      50% { 
        opacity: 0.6;
        transform: scale(1.15);
      }
    }

    .profile img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      animation: profileFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 10px 30px rgba(108, 92, 231, 0.5));
    }

    @keyframes profileFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .profile h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, white, var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 25px;
      margin-bottom: 10px;
      animation: slideInUp 0.8s ease 0.2s backwards;
      letter-spacing: -1px;
    }

    .profile p {
      font-size: 1.3rem;
      color: var(--secondary);
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 30px;
      animation: slideInUp 0.8s ease 0.3s backwards;
      text-transform: uppercase;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== SOCIAL LINKS ===== */
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      text-decoration: none;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.998);
      border-radius: 30px;
      background: var(--glass);
      border: 2px solid var(--glass-border);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 1.05rem;
      overflow: hidden;
      animation: slideInUp 0.6s ease backwards;
    }

    .link:nth-child(1) { animation-delay: 0.4s; }
    .link:nth-child(2) { animation-delay: 0.5s; }
    .link:nth-child(3) { animation-delay: 0.6s; }
    .link:nth-child(4) { animation-delay: 0.7s; }
    .link:nth-child(5) { animation-delay: 0.8s; }
    .link:nth-child(6) { animation-delay: 0.9s; }

    .link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
      z-index: -1;
    }

    .link:hover::before {
      left: 100%;
    }

    .link:hover {
      transform: translateY(-8px) scale(1.05);
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.2);
      box-shadow: 0 15px 40px rgba(108, 92, 231, 0.4);
    }

    .link i {
      font-size: 1.3rem;
      transition: all 0.3s ease;
    }

    .link:hover i {
      animation: iconBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 0 8px currentColor);
    }

    @keyframes iconBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-5deg); }
      75% { transform: translateY(8px) rotate(5deg); }
    }

    /* ===== SPOTIFY EMBED ===== */
    .spotify-container {
      margin-top: 30px;
      animation: slideInUp 0.8s ease 1s backwards;
    }

    .spotify-container iframe {
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(108, 92, 231, 0.3);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
    }

    .spotify-container iframe:hover {
      box-shadow: 0 25px 70px rgba(108, 92, 231, 0.5);
      transform: translateY(-5px);
    }

    /* ===== FOOTER ===== */
    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      color: var(--secondary);
      font-size: 0.9rem;
      padding: 30px 20px;
      border-top: 1px solid var(--glass-border);
      margin-top: 60px;
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
      margin: 0 10px;
      transition: all 0.3s ease;
      position: relative;
    }

    footer a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    footer a:hover::after {
      width: 100%;
    }

    /* ===== RESPONSIVE DESIGN ===== */
    @media (max-width: 768px) {
      .wrapper {
        padding: 40px 20px;
      }

      .container {
        max-width: 100%;
      }

      .profile-wrapper {
        width: 120px;
        height: 120px;
      }

      .profile img {
        width: 120px;
        height: 120px;
      }

      .profile h1 {
        font-size: 2.5rem;
      }

      .profile p {
        font-size: 1rem;
      }

      .link {
        padding: 14px 20px;
        font-size: 1rem;
      }

      .theme-toggle {
        width: 50px;
        height: 50px;
        top: 20px;
        right: 20px;
      }
    }

    @media (max-width: 480px) {
      .profile-wrapper {
        width: 100px;
        height: 100px;
      }

      .profile img {
        width: 100px;
        height: 100px;
      }

      .profile h1 {
        font-size: 2rem;
      }

      .profile p {
        font-size: 0.9rem;
        letter-spacing: 1px;
      }

      .link {
        padding: 12px 16px;
        font-size: 0.95rem;
      }

      .spotify-container iframe {
        height: 70px !important;
      }

      footer {
        font-size: 0.85rem;
      }
    }

    /* ===== LIGHT MODE ===== */
    body.light-mode {
      background: url('https://i.imgur.com/y42rCO1.jpeg') no-repeat center/cover;
    }

    body.light-mode .glass-overlay {
      background: rgba(255, 255, 255, 0.3);
    }

    body.light-mode .profile h1 {
      background: linear-gradient(135deg, white, var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    body.light-mode .profile p {
      color: var(--secondary);
    }

    body.light-mode .link {
      color: white;
      background: rgba(108, 92, 231, 0.15);
      border-color: rgba(108, 92, 231, 0.3);
    }

    body.light-mode .link:hover {
      background: rgba(108, 92, 231, 0.25);
    }

    body.light-mode footer {
      color: var(--secondary);
      border-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

<body>

  <!-- GLASS OVERLAY -->
  <div class="glass-overlay"></div>

  <!-- LOADER -->
  <div class="loader-container" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">JAVAS</div>
  </div>

  <!-- CUSTOM CURSOR -->
  <div class="cursor" id="cursor"></div>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Mode">
    <i class="fas fa-moon"></i>
  </button>

  <!-- MAIN WRAPPER -->
  <div class="wrapper">
    <div class="container">
      <!-- PROFILE SECTION -->
      <div class="profile">
        <div class="profile-wrapper">
          <div class="profile-glow"></div>
          <img src="https://i.imgur.com/Ho4R7Ph.jpeg" alt="Javas" loading="lazy">
        </div>
        <h1>JAVAS</h1>
        <p>フリーレン：旅の終わりの先へ</p>
      </div>

      <!-- SOCIAL LINKS -->
      <div class="links-container">
        <a class="link" href="https://www.instagram.com/javasrajagula14" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-instagram"></i>
          <span>Instagram</span>
        </a>

        <a class="link" href="https://open.spotify.com/playlist/2g1jFgBzMVW1fmHMqreV0s" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-spotify"></i>
          <span>Spotify Playlist</span>
        </a>

        <a class="link" href="https://wa.me/6285338123425" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-whatsapp"></i>
          <span>WhatsApp</span>
        </a>

        <a class="link" href="https://www.facebook.com/javas.265377" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-facebook"></i>
          <span>Facebook</span>
        </a>

        <a class="link" href="https://github.com/javasrajagula" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-github"></i>
          <span>GitHub</span>
        </a>

        <a class="link" href="https://discord.gg/74TPHMb8" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-discord"></i>
          <span>Discord Server</span>
        </a>
      </div>

      <!-- SPOTIFY EMBED -->
      <div class="spotify-container">
        <iframe src="https://open.spotify.com/embed/track/5tlb0AxuzsMWL2GtEppXGX?si=514511435dd44726" width="100%" height="80" frameborder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Javas | <a href="https://github.com/javasrajagula" target="_blank">Source Code</a></p>
  </footer>

  <script>
    // ===== LOADER =====
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
      }, 2500);
    });

    // ===== ADVANCED CURSOR =====
    const cursor = document.getElementById('cursor');
    let mouseX = 0, mouseY = 0;
    let lastX = 0, lastY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
    });

    // Cursor trail effect
    const trailContainer = document.body;
    setInterval(() => {
      if (Math.abs(mouseX - lastX) > 5 || Math.abs(mouseY - lastY) > 5) {
        const trail = document.createElement('div');
        trail.className = 'cursor-trail';
        trail.style.width = Math.random() * 6 + 4 + 'px';
        trail.style.height = trail.style.width;
        trail.style.left = mouseX + 'px';
        trail.style.top = mouseY + 'px';
        trail.style.borderColor = `hsl(${Math.random() * 60 + 240}, 100%, 60%)`;
        
        trailContainer.appendChild(trail);
        
        setTimeout(() => trail.remove(), 600);
        
        lastX = mouseX;
        lastY = mouseY;
      }
    }, 30);

    // Hover effect
    document.querySelectorAll('.link, .theme-toggle').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('active'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
    });

    // ===== THEME TOGGLE =====
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';

    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
      themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      themeToggle.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      
      // Animate rotation
      themeToggle.style.transform = 'scale(1.15) rotate(20deg)';
      setTimeout(() => {
        themeToggle.style.transform = '';
      }, 400);
    });

    // ===== SMOOTH SCROLL =====
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(anchor.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>

</body>
</html>
