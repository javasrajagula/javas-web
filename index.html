<<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javasrajagula</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- FONT JEPANG -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Noto Sans JP', sans-serif;
  height:100vh;
  background:url('https://i.imgur.com/Ho4R7Ph.jpeg') no-repeat center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:none;
}

.cursor{
  width:32px;
  height:32px;
  background:url('https://cdn.custom-cursor.com/packs/3475/meme-pop-cat-pack.png') no-repeat center/contain;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}

.loader{
  position:fixed;width:100%;height:100%;background:black;
  display:flex;align-items:center;justify-content:center;
  color:white;font-size:20px;z-index:1000;
}

body::before{
  content:"";position:absolute;width:100%;height:100%;
  backdrop-filter: blur(20px);background:rgba(0,0,0,0.5);
}

.container{
  position:relative;z-index:2;text-align:center;
  width:90%;max-width:350px;animation:fadeIn 1.2s ease;
}

.profile img{
  width:110px;height:110px;border-radius:50%;
  border:3px solid white;margin-bottom:10px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px white}
  to{box-shadow:0 0 25px white}
}

h1{color:white}

p{
  color:#fff;
  margin-bottom:20px;
}

.link{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px;margin:10px 0;border-radius:20px;
  text-decoration:none;font-weight:bold;color:white;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
}

.link:hover{
  transform:scale(1.07);
  background:rgba(255,255,255,0.25);
}

canvas{position:absolute;top:0;left:0;z-index:1}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>
<div class="cursor" id="cursor"></div>
<canvas id="particles"></canvas>

<div class="container">
  <div class="profile">
    <img src="https://i.imgur.com/Ho4R7Ph.jpeg">
    <h1>Javas</h1>
    <p>フリーレン：旅の終わりの先へ </p>
  </div>

  <a class="link" href="https://www.instagram.com/javasrajagula14/?__pwa=1#" target="_blank">
    <i class="fa-brands fa-instagram"></i> Instagram
  </a>

  <a class="link" href="https://open.spotify.com/playlist/2g1jFgBzMVW1fmHMqreV0s?si=5b14ac725db9426d" target="_blank">
    <i class="fa-brands fa-spotify"></i> Spotify
  </a>

  <a class="link" href="https://wa.me/6285338123425" target="_blank">
    <i class="fa-brands fa-whatsapp"></i> WhatsApp
  </a>

  <a class="link" href="https://www.facebook.com/javas.265377" target="_blank">
    <i class="fa-brands fa-facebook"></i> Facebook
  </a>

  <a class="link" href="https://github.com/javasrajagula" target="_blank">
    <i class="fa-brands fa-github"></i> GitHub
  </a>

  <a class="link" href="https://discord.gg/74TPHMb8" target="_blank">
    <i class="fa-brands fa-discord"></i> Discord
  </a>
</div>

<script>
window.onload = ()=>{
  document.getElementById('loader').style.display='none';
}

const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e=>{
  cursor.style.left = e.clientX+'px';
  cursor.style.top = e.clientY+'px';
});

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<50;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='white';
    ctx.fill();
    p.x+=p.dx;
    p.y+=p.dy;
  });
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
