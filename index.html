<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Javas — フリーレン：旅の終わりの先へ">
  <meta name="keywords" content="Javas, Portfolio, Interactive, Bio">
  <meta name="author" content="Javas">
  <meta name="theme-color" content="#04020f">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Javas">
  <meta property="og:description" content="Javas — フリーレン：旅の終わりの先へ">
  <meta property="og:image" content="https://i.imgur.com/Ho4R7Ph.jpeg">
  <link rel="icon" href="https://i.imgur.com/Ho4R7Ph.jpeg">
  <title>Javas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600;700;800&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --p:#7c6be8;--p2:#5e4de0;--s:#b3a8ff;
      --a:#ff7675;--t:#00d2c8;
      --g:rgba(255,255,255,.07);--gb:rgba(255,255,255,.12);
      --glow:rgba(124,107,232,.5);
      --txt:#fff;--txt2:rgba(179,168,255,.85);
      --cbg:rgba(255,255,255,.05);
    }
    html{scroll-behavior:smooth}
    body{
      font-family:'Poppins',sans-serif;
      background:#04020f url('https://i.imgur.com/y42rCO1.jpeg') no-repeat center/cover fixed;
      min-height:100vh;color:var(--txt);
      overflow-x:hidden;position:relative;
    }
    @media(hover:none)and(pointer:coarse){
      body{cursor:auto!important}
      .cursor,.cursor-trail{display:none!important}
      *{cursor:auto}
      a,button{cursor:pointer}
    }
    @media(hover:hover)and(pointer:fine){
      body,a,button{cursor:none}
    }

    /* OVERLAY */
    .ov{
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%,rgba(108,92,231,.18) 0%,transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%,rgba(0,210,200,.13) 0%,transparent 60%),
        linear-gradient(170deg,rgba(4,2,20,.82) 0%,rgba(14,8,50,.78) 50%,rgba(4,2,20,.88) 100%);
      backdrop-filter:blur(26px) saturate(1.3);
      z-index:1;pointer-events:none;
    }

    /* CANVAS */
    #cvs{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.75}

    /* LOADER */
    #ldr{
      position:fixed;inset:0;background:#04020f;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;transition:opacity .9s ease,visibility .9s ease;
    }
    #ldr.out{opacity:0;visibility:hidden}
    .l-logo{
      font-size:2.2rem;font-weight:800;letter-spacing:10px;
      background:linear-gradient(135deg,#fff 30%,var(--s));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:lp 1.4s ease-in-out infinite;margin-bottom:28px;
    }
    @keyframes lp{0%,100%{opacity:.3}50%{opacity:1}}
    .l-bar{width:160px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .l-fill{height:100%;width:0;background:linear-gradient(90deg,var(--p),var(--t));border-radius:2px;animation:lf 2s ease forwards}
    @keyframes lf{to{width:100%}}

    /* CURSOR */
    .cursor{
      width:20px;height:20px;
      border:1.5px solid rgba(124,107,232,.7);border-radius:50%;
      position:fixed;pointer-events:none;z-index:9998;
      transform:translate(-50%,-50%);
      transition:width .2s,height .2s,background .2s,border-color .2s,opacity .3s;
      mix-blend-mode:screen;
    }
    .cursor::after{
      content:'';position:absolute;top:50%;left:50%;
      width:4px;height:4px;background:var(--p);border-radius:50%;
      transform:translate(-50%,-50%);transition:opacity .2s;
    }
    .cursor.active{width:42px;height:42px;border-color:var(--a);background:rgba(255,118,117,.07)}
    .cursor.active::after{opacity:0}
    .cursor-trail{position:fixed;pointer-events:none;border-radius:50%;z-index:9996;transform:translate(-50%,-50%)}

    /* THEME BTN */
    .tbtn{
      position:fixed;top:22px;right:22px;z-index:500;
      width:46px;height:46px;border-radius:50%;
      border:1px solid var(--gb);background:var(--g);
      backdrop-filter:blur(16px);color:#fff;font-size:16px;
      display:flex;align-items:center;justify-content:center;
      transition:transform .4s cubic-bezier(.34,1.56,.64,1),background .3s,border-color .3s,box-shadow .3s;
      box-shadow:0 4px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);
    }
    .tbtn:hover{
      transform:scale(1.12) rotate(18deg);
      background:rgba(124,107,232,.22);border-color:var(--p);
      box-shadow:0 8px 32px var(--glow),0 0 0 1px rgba(124,107,232,.3);
    }

    /* WRAPPER */
    .wrap{
      position:relative;z-index:3;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:72px 20px 44px;
    }
    .cont{text-align:center;width:100%;max-width:470px}

    /* PROFILE */
    .prf{margin-bottom:36px}
    .pw{position:relative;width:136px;height:136px;margin:0 auto 20px;perspective:600px}
    .pring{
      position:absolute;inset:-6px;border-radius:50%;
      background:conic-gradient(from 0deg,var(--p),var(--t),var(--a),var(--s),var(--p));
      animation:rr 3.5s linear infinite;z-index:1;
    }
    .pring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:#07051a}
    @keyframes rr{to{transform:rotate(360deg)}}
    .pglow{
      position:absolute;inset:-18px;border-radius:50%;
      background:radial-gradient(circle,var(--p) 0%,transparent 68%);
      opacity:0;z-index:0;animation:gp 3.5s ease-in-out infinite;
    }
    @keyframes gp{0%,100%{opacity:0;transform:scale(.9)}50%{opacity:.5;transform:scale(1.06)}}
    .prf img{
      width:136px;height:136px;border-radius:50%;
      border:3px solid rgba(255,255,255,.92);object-fit:cover;
      display:block;position:relative;z-index:2;
      animation:fl 5s ease-in-out infinite;
      filter:drop-shadow(0 10px 28px rgba(108,92,231,.55));
      will-change:transform;
    }
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
    .prf h1{
      font-size:3rem;font-weight:800;
      background:linear-gradient(130deg,#fff 20%,var(--s) 80%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      letter-spacing:-1px;line-height:1.1;margin-bottom:8px;
      opacity:0;transform:translateY(20px);
      animation:fu .7s cubic-bezier(.34,1.56,.64,1) .25s forwards;
    }
    .prf p{
      font-size:.88rem;color:var(--txt2);font-weight:300;
      letter-spacing:2.5px;text-transform:uppercase;
      overflow:hidden;white-space:nowrap;
      border-right:2px solid var(--s);width:0;margin:0 auto;
      animation:tw 1.6s steps(22,end) .9s forwards,bk .7s step-end infinite;
      display:inline-block;
    }
    @keyframes tw{to{width:100%;border-right-color:transparent}}
    @keyframes bk{50%{border-right-color:transparent}}
    @keyframes fu{to{opacity:1;transform:translateY(0)}}

    /* LINKS */
    .lc{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
    .lnk{
      position:relative;display:flex;align-items:center;gap:13px;
      padding:14px 18px;text-decoration:none;
      font-weight:600;color:rgba(255,255,255,.92);
      border-radius:16px;background:var(--cbg);
      border:1px solid var(--gb);backdrop-filter:blur(14px);
      transition:transform .32s cubic-bezier(.34,1.56,.64,1),background .28s,border-color .28s,box-shadow .28s;
      font-size:.98rem;overflow:hidden;will-change:transform;
      opacity:0;transform:translateY(18px);
      animation:fu .55s ease backwards;
      box-shadow:0 2px 14px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.05);
      text-align:left;transform-style:preserve-3d;
    }
    .lnk:nth-child(1){animation-delay:.38s}.lnk:nth-child(2){animation-delay:.46s}
    .lnk:nth-child(3){animation-delay:.54s}.lnk:nth-child(4){animation-delay:.62s}
    .lnk:nth-child(5){animation-delay:.70s}.lnk:nth-child(6){animation-delay:.78s}
    /* shimmer */
    .lnk::before{
      content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
      transition:left .6s ease;pointer-events:none;
    }
    .lnk:hover::before{left:150%}
    /* bottom glow line */
    .gl{
      position:absolute;bottom:0;left:15%;right:15%;height:1px;
      background:linear-gradient(90deg,transparent,var(--lc,var(--p)),transparent);
      opacity:0;transition:opacity .3s;pointer-events:none;
    }
    .lnk:hover .gl{opacity:1}
    .lnk:hover{
      transform:translateY(-5px) scale(1.018);
      background:rgba(255,255,255,.09);
      border-color:rgba(124,107,232,.4);
      box-shadow:0 16px 40px rgba(0,0,0,.32),0 0 0 1px rgba(124,107,232,.18),0 0 30px -8px var(--lc,var(--p));
    }
    .lnk:active{transform:scale(.97) translateY(0)!important}
    /* icon box */
    .ib{
      display:flex;align-items:center;justify-content:center;
      width:36px;height:36px;border-radius:10px;
      background:color-mix(in srgb,var(--lc,var(--p)) 14%,transparent);
      border:1px solid color-mix(in srgb,var(--lc,var(--p)) 26%,transparent);
      flex-shrink:0;transition:transform .32s cubic-bezier(.34,1.56,.64,1),background .28s;
    }
    .lnk:hover .ib{transform:scale(1.14) rotate(-6deg);background:color-mix(in srgb,var(--lc,var(--p)) 24%,transparent)}
    .lnk .bi{font-size:1.1rem;color:var(--lc,inherit);transition:filter .3s}
    .lnk:hover .bi{filter:drop-shadow(0 0 8px var(--lc,var(--p)))}
    .arr{margin-left:auto;flex-shrink:0;font-size:.7rem;color:var(--s);opacity:0;transform:translateX(-10px);transition:opacity .28s,transform .28s}
    .lnk:hover .arr{opacity:.85;transform:translateX(0)}
    /* brand colors */
    .lnk[data-b="ig"]{--lc:#e1306c}.lnk[data-b="sp"]{--lc:#1db954}
    .lnk[data-b="wa"]{--lc:#25d366}.lnk[data-b="fb"]{--lc:#4ca3ff}
    .lnk[data-b="gh"]{--lc:#c9d1d9}.lnk[data-b="dc"]{--lc:#7289da}

    /* SPOTIFY */
    .spw{opacity:0;transform:translateY(18px);animation:fu .65s ease .9s forwards}
    .spw iframe{
      border-radius:14px;box-shadow:0 12px 44px rgba(0,0,0,.42);
      border:1px solid var(--gb);display:block;
      transition:transform .4s,box-shadow .4s;
    }
    .spw:hover iframe{
      transform:translateY(-4px);
      box-shadow:0 22px 60px rgba(0,0,0,.5),0 0 0 1px rgba(124,107,232,.22);
    }

    /* FOOTER */
    footer{
      position:relative;z-index:3;text-align:center;
      color:rgba(179,168,255,.4);font-size:.8rem;
      padding:22px 20px 30px;
      border-top:1px solid rgba(255,255,255,.06);
      margin-top:46px;letter-spacing:.4px;
    }
    footer a{color:var(--s);text-decoration:none;margin:0 6px;transition:color .3s;position:relative}
    footer a::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1px;background:var(--p);transition:width .3s}
    footer a:hover{color:#fff}
    footer a:hover::after{width:100%}

    /* LIGHT MODE */
    body.lm{background-color:#e8e4f8}
    body.lm .ov{background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(108,92,231,.08) 0%,transparent 60%),linear-gradient(170deg,rgba(240,235,255,.72) 0%,rgba(220,210,255,.68) 100%)}
    body.lm{color:#18103a}
    body.lm .prf h1{background:linear-gradient(130deg,#18103a 20%,var(--p) 80%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    body.lm .prf p{color:var(--p)}
    body.lm .lnk{color:#1a1040;background:rgba(255,255,255,.55);border-color:rgba(108,92,231,.18)}
    body.lm .lnk:hover{background:rgba(255,255,255,.75)}
    body.lm footer{color:rgba(108,92,231,.45)}
    body.lm footer a{color:var(--p)}

    /* RESPONSIVE */
    @media(max-width:480px){
      .wrap{padding:62px 14px 32px}
      .prf h1{font-size:2.4rem}
      .pw{width:116px;height:116px}
      .prf img{width:116px;height:116px}
      .lnk{padding:12px 15px;font-size:.93rem;border-radius:13px}
      .ib{width:32px;height:32px}
      .tbtn{width:42px;height:42px;top:14px;right:14px}
    }
  </style>
</head>

<script>
const isTouch = () => matchMedia('(hover:none) and (pointer:coarse)').matches;

/* LOADER */
window.addEventListener('load', () => setTimeout(() => document.getElementById('ldr').classList.add('out'), 2100));

/* PARTICLE CANVAS */
(function(){
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  let W, H, mouse = {x:-999,y:-999};
  const COLS = ['rgba(124,107,232,.55)','rgba(0,210,200,.45)','rgba(255,118,117,.38)','rgba(179,168,255,.4)'];

  function resize(){ W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function P() { this.reset(); }
  P.prototype.reset = function(){
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.r = Math.random()*1.6+.4;
    this.vx = (Math.random()-.5)*.35; this.vy = (Math.random()-.5)*.35;
    this.col = COLS[Math.floor(Math.random()*COLS.length)];
    this.life = Math.random()*300+200; this.age = 0;
  };
  P.prototype.update = function(){
    this.age++;
    if(this.age > this.life){ this.reset(); return; }
    const dx=this.x-mouse.x, dy=this.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<120){ const f=(120-d)/120*.6; this.vx+=dx/d*f; this.vy+=dy/d*f; }
    this.vx*=.98; this.vy*=.98;
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0)this.x=W; if(this.x>W)this.x=0;
    if(this.y<0)this.y=H; if(this.y>H)this.y=0;
  };
  P.prototype.draw = function(){
    const fade = Math.min(this.age/40,1)*Math.min((this.life-this.age)/40,1);
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle = this.col.replace(/[\d.]+\)$/,m=>(parseFloat(m)*fade).toFixed(2)+')');
    ctx.fill();
  };

  const N = isTouch() ? 55 : 110;
  const pts = Array.from({length:N},()=>new P());

  function lines(){
    const MD=85;
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<MD){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(124,107,232,${(1-d/MD)*.11})`; ctx.lineWidth=.5; ctx.stroke(); }
    }
  }

  (function loop(){ ctx.clearRect(0,0,W,H); lines(); pts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); })();

  if(!isTouch()){
    document.addEventListener('mousemove', e=>{mouse.x=e.clientX; mouse.y=e.clientY;});
    document.addEventListener('mouseleave', ()=>{mouse.x=-999; mouse.y=-999;});
  }
})();

/* CURSOR */
if(!isTouch()){
  const cur = document.getElementById('cur');
  let mx=0,my=0,lx=0,ly=0;
  document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
  setInterval(()=>{
    if(Math.abs(mx-lx)>3||Math.abs(my-ly)>3){
      const t=document.createElement('div'); const sz=Math.random()*4+2;
      t.className='cursor-trail';
      t.style.cssText=`width:${sz}px;height:${sz}px;left:${mx}px;top:${my}px;background:hsl(${Math.random()*60+240},85%,65%);opacity:.65;transition:opacity .5s,transform .5s`;
      document.body.appendChild(t);
      requestAnimationFrame(()=>{ t.style.opacity='0'; t.style.transform=`translate(${(Math.random()-.5)*18}px,${(Math.random()-.5)*18}px) scale(.2)`; });
      setTimeout(()=>t.remove(),520);
      lx=mx; ly=my;
    }
  },25);
  document.querySelectorAll('.lnk,.tbtn').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('active'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('active'));
  });
  document.addEventListener('mouseleave',()=>cur.style.opacity='0');
  document.addEventListener('mouseenter',()=>cur.style.opacity='1');
}

/* 3D TILT ON LINKS */
if(!isTouch()){
  document.querySelectorAll('.lnk').forEach(lnk=>{
    lnk.addEventListener('mousemove', e=>{
      const r=lnk.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-.5)*9;
      const y=((e.clientY-r.top)/r.height-.5)*9;
      lnk.style.transform=`translateY(-5px) scale(1.018) rotateX(${-y}deg) rotateY(${x}deg)`;
    });
    lnk.addEventListener('mouseleave',()=>{ lnk.style.transform=''; });
  });

  /* profile 3D tilt with mouse position */
  const pw = document.getElementById('pw');
  if(pw){
    document.addEventListener('mousemove', e=>{
      const cx=innerWidth/2, cy=innerHeight/2;
      const x=(e.clientX-cx)/cx*8, y=(e.clientY-cy)/cy*6;
      pw.style.transform=`perspective(600px) rotateX(${-y}deg) rotateY(${x}deg)`;
    });
    document.addEventListener('mouseleave',()=>{ pw.style.transform=''; });
  }
}

/* RIPPLE */
document.querySelectorAll('.lnk').forEach(lnk=>{
  lnk.addEventListener('pointerdown', e=>{
    const r=lnk.getBoundingClientRect();
    const rpl=document.createElement('span');
    const sz=Math.max(r.width,r.height)*1.5;
    rpl.style.cssText=`position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.13);width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px;transform:scale(0);opacity:1;transition:transform .55s ease,opacity .55s ease`;
    lnk.appendChild(rpl);
    requestAnimationFrame(()=>{ rpl.style.transform='scale(1)'; rpl.style.opacity='0'; });
    setTimeout(()=>rpl.remove(),560);
  });
});

/* THEME */
const tb = document.getElementById('tbtn');
if(localStorage.getItem('theme')==='light'){ document.body.classList.add('lm'); tb.innerHTML='<i class="fas fa-sun"></i>'; }
tb.addEventListener('click',()=>{
  document.body.classList.toggle('lm');
  const lm=document.body.classList.contains('lm');
  localStorage.setItem('theme',lm?'light':'dark');
  tb.innerHTML=lm?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
});
</script>
